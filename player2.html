<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللاعب الثاني - الاستعداد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0e17; color: #f0e6d3; min-height: 100vh; overflow: hidden; position: relative; }
        canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; gap: 28px; }
        .room-badge { font-size: 0.85rem; color: #666; background: rgba(255,255,255,0.04); padding: 6px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); }
        .my-label { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 900; color: #00c9a7; }
        .status-row { display: flex; gap: 36px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .status-card { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 18px 28px; border-radius: 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); min-width: 150px; }
        .status-card .label { font-size: 0.9rem; color: #888; }
        .dot { width: 22px; height: 22px; border-radius: 50%; background: #333; transition: all 0.5s; }
        .dot.green { background: #00e676; box-shadow: 0 0 18px rgba(0,230,118,0.6); animation: dotGlow 1.2s ease-in-out infinite; }
        .dot.blue { background: #29b6f6; box-shadow: 0 0 18px rgba(41,182,246,0.6); animation: dotGlow 1.2s ease-in-out infinite; }
        @keyframes dotGlow { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
        .ready-btn { padding: 18px 56px; font-size: 1.3rem; font-weight: 900; font-family: 'Tajawal', sans-serif; border: none; border-radius: 50px; background: linear-gradient(135deg, #00c9a7, #00a88a); color: #fff; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 25px rgba(0,201,167,0.35); }
        .ready-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 35px rgba(0,201,167,0.5); }
        .ready-btn:active { transform: scale(0.97); }
        .ready-btn:disabled { background: #333; cursor: not-allowed; box-shadow: none; transform: none; color: #666; }
        .ready-btn:disabled::after { content: ' تم الاستعداد'; color: #00e676; }
        .countdown-box { display: none; flex-direction: column; align-items: center; gap: 10px; }
        .countdown-box.show { display: flex; }
        .countdown-num { font-size: clamp(4rem, 12vw, 8rem); font-weight: 900; background: linear-gradient(135deg, #00c9a7, #FFB800); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: cdPop 0.5s ease-out; }
        @keyframes cdPop { 0%{transform:scale(2);opacity:0} 100%{transform:scale(1);opacity:1} }
        .countdown-label { font-size: 1.1rem; color: #888; }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.1; pointer-events: none; z-index: 0; }
        .orb1 { width: 340px; height: 340px; background: #00c9a7; top: -80px; left: -80px; }
        .orb2 { width: 280px; height: 280px; background: #FFB800; bottom: -80px; right: -80px; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="content">
        <div class="room-badge" id="roomBadge">غرفة: ---</div>
        <div class="my-label">اللاعب الثاني</div>
        <div class="status-row">
            <div class="status-card"><span class="label">حالتك</span><div class="dot" id="myDot"></div></div>
            <div class="status-card"><span class="label">حالة الخصم</span><div class="dot" id="oppDot"></div></div>
        </div>
        <button class="ready-btn" id="readyBtn" onclick="setReady()">استعداد</button>
        <div class="countdown-box" id="cdBox">
            <div class="countdown-num" id="cdNum">10</div>
            <div class="countdown-label">سيبدأ التحدي...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyCEEqEALOCaQo5oSoR8A_Jh9eSpHS8Sz5o",
            authDomain: "game1-bb93e.firebaseapp.com",
            databaseURL: "https://game1-bb93e-default-rtdb.firebaseio.com",
            projectId: "game1-bb93e", storageBucket: "game1-bb93e.firebasestorage.app",
            messagingSenderId: "268851425259", appId: "1:268851425259:web:0074f52657190d7347b3ae"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        var params = new URLSearchParams(window.location.search);
        var roomCode = params.get("room");
        if (!roomCode) { window.location.href = "index.html"; }
        var roomRef = db.ref("rooms/" + roomCode);
        document.getElementById("roomBadge").textContent = "غرفة: " + roomCode;

        var MY = "player2", OPP = "player1";
        var cdStarted = false;

        /* جسيمات */
        (function() {
            var c = document.getElementById("bg"), x = c.getContext("2d"), w = 0, h = 0, pts = [];
            function r() { w = c.width = innerWidth; h = c.height = innerHeight; } r();
            addEventListener("resize", r);
            for (var i = 0; i < 45; i++) pts.push({ x: Math.random()*2e3, y: Math.random()*2e3, r: Math.random()*1.8+0.3, dx: (Math.random()-0.5)*0.35, dy: (Math.random()-0.5)*0.35, hue: 160+Math.random()*30, a: 0.12+Math.random()*0.35 });
            (function d() { x.clearRect(0,0,w,h); for(var i=0;i<pts.length;i++){var p=pts[i];x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle="hsla("+p.hue+",100%,60%,"+p.a+")";x.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>w)p.dx*=-1;if(p.y<0||p.y>h)p.dy*=-1;}requestAnimationFrame(d); })();
        })();

        function generateQuestions(count) {
            var ops = ["+", "-", "\u00D7"], qs = [];
            for (var i = 0; i < count; i++) {
                var op = ops[Math.floor(Math.random() * ops.length)];
                var diff = Math.random(), a = 0, b = 0, ans = 0;
                if (diff < 0.33) { a = Math.floor(Math.random()*9)+1; b = Math.floor(Math.random()*9)+1; }
                else if (diff < 0.66) { a = Math.floor(Math.random()*20)+1; b = Math.floor(Math.random()*9)+1; }
                else { a = Math.floor(Math.random()*90)+10; b = Math.floor(Math.random()*9)+1; }
                if (op === "-" && a < b) { var t = a; a = b; b = t; }
                if (op === "+") ans = a+b; else if (op === "-") ans = a-b; else ans = a*b;
                qs.push({ num1: a, num2: b, operator: op, answer: ans });
            }
            return qs;
        }

        function setReady() {
            document.getElementById("readyBtn").disabled = true;
            document.getElementById("myDot").classList.add("green");
            roomRef.child(MY + "Ready").set(true);
        }

        roomRef.child(OPP + "Ready").on("value", function(s) { if (s.val()) document.getElementById("oppDot").classList.add("blue"); });
        roomRef.child(MY + "Ready").on("value", function(s) { if (s.val()) document.getElementById("myDot").classList.add("green"); });

        function checkBothReady() {
            roomRef.once("value").then(function(snap) {
                var d = snap.val(); if (!d) return;
                if (d.player1Ready && d.player2Ready && !cdStarted) {
                    cdStarted = true;
                    if (!d.questions) { roomRef.child("questions").transaction(function(cur) { return cur || generateQuestions(10); }); }
                    var st = Date.now();
                    roomRef.child("countdownStartTime").set(st);
                    startCountdown(st);
                }
            });
        }
        roomRef.child("player1Ready").on("value", function() { checkBothReady(); });
        roomRef.child("player2Ready").on("value", function() { checkBothReady(); });

        function startCountdown(startTime) {
            document.getElementById("readyBtn").style.display = "none";
            document.getElementById("cdBox").classList.add("show");
            var iv = setInterval(function() {
                var rem = Math.max(0, Math.ceil(10 - (Date.now()-startTime)/1000));
                var el = document.getElementById("cdNum");
                el.textContent = rem; el.style.animation = "none"; el.offsetHeight; el.style.animation = "cdPop 0.5s ease-out";
                if (rem <= 0) { clearInterval(iv); roomRef.child("gameStarted").set(true); window.location.href = "player4.html?room=" + roomCode; }
            }, 100);
        }

        roomRef.child("gameStarted").on("value", function(s) { if (s.val()) window.location.href = "player4.html?room=" + roomCode; });
    </script>
</body>
</html>
