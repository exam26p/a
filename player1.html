<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللاعب الأول - الاستعداد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0e17;
            color: #f0e6d3;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        canvas#bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            gap: 30px;
        }

        .my-label {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 900;
            color: #ff6b35;
        }

        .status-row {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 30px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 160px;
        }

        .status-card .label {
            font-size: 0.95rem;
            color: #888;
            font-weight: 400;
        }

        .dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #333;
            transition: all 0.5s;
        }

        .dot.green {
            background: #00e676;
            box-shadow: 0 0 18px rgba(0, 230, 118, 0.6);
            animation: dotGlow 1.2s ease-in-out infinite;
        }

        .dot.blue {
            background: #29b6f6;
            box-shadow: 0 0 18px rgba(41, 182, 246, 0.6);
            animation: dotGlow 1.2s ease-in-out infinite;
        }

        @keyframes dotGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .ready-btn {
            padding: 18px 60px;
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Tajawal', sans-serif;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b35, #e85d26);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 25px rgba(255, 107, 53, 0.35);
        }

        .ready-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 35px rgba(255, 107, 53, 0.5);
        }

        .ready-btn:active {
            transform: scale(0.97);
        }

        .ready-btn:disabled {
            background: #333;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            color: #666;
        }

        .ready-btn:disabled::after {
            content: ' تم الاستعداد';
            color: #00e676;
        }

        .countdown-box {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .countdown-box.show {
            display: flex;
        }

        .countdown-num {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b35, #ffd700);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cdPop 0.5s ease-out;
        }

        @keyframes cdPop {
            0% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .countdown-label {
            font-size: 1.1rem;
            color: #888;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .orb1 {
            width: 350px;
            height: 350px;
            background: #ff6b35;
            top: -80px;
            right: -80px;
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: #ffd700;
            bottom: -80px;
            left: -80px;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="content">
        <div class="my-label">اللاعب الأول</div>
        <div class="status-row">
            <div class="status-card">
                <span class="label">حالتك</span>
                <div class="dot" id="myDot"></div>
            </div>
            <div class="status-card">
                <span class="label">حالة الخصم</span>
                <div class="dot" id="oppDot"></div>
            </div>
        </div>
        <button class="ready-btn" id="readyBtn" onclick="setReady()">استعداد</button>
        <div class="countdown-box" id="cdBox">
            <div class="countdown-num" id="cdNum">10</div>
            <div class="countdown-label">سيبدأ التحدي...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        /* === Firebase === */
        var firebaseConfig = {
            apiKey: "AIzaSyCEEqEALOCaQo5oSoR8A_Jh9eSpHS8Sz5o",
            authDomain: "game1-bb93e.firebaseapp.com",
            databaseURL: "https://game1-bb93e-default-rtdb.firebaseio.com",
            projectId: "game1-bb93e",
            storageBucket: "game1-bb93e.firebasestorage.app",
            messagingSenderId: "268851425259",
            appId: "1:268851425259:web:0074f52657190d7347b3ae"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var gameRef = db.ref("a1");
        var MY = "player1";
        var OPP = "player2";
        var cdStarted = false;

        /* === جسيمات الخلفية === */
        (function initParticles() {
            var canvas = document.getElementById("bg");
            var ctx = canvas.getContext("2d");
            var w = 0;
            var h = 0;
            var particles = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }

            resize();
            window.addEventListener("resize", resize);

            for (var i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * 2000,
                    y: Math.random() * 2000,
                    r: Math.random() * 2 + 0.3,
                    dx: (Math.random() - 0.5) * 0.4,
                    dy: (Math.random() - 0.5) * 0.4,
                    hue: 20 + Math.random() * 25,
                    alpha: 0.15 + Math.random() * 0.4
                });
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);

                for (var i = 0; i < particles.length; i++) {
                    var p = particles[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = "hsla(" + p.hue + ", 100%, 60%, " + p.alpha + ")";
                    ctx.fill();

                    p.x = p.x + p.dx;
                    p.y = p.y + p.dy;
                    if (p.x < 0 || p.x > w) { p.dx = p.dx * -1; }
                    if (p.y < 0 || p.y > h) { p.dy = p.dy * -1; }
                }

                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            var lineAlpha = 0.1 * (1 - dist / 120);
                            ctx.strokeStyle = "rgba(255, 107, 53, " + lineAlpha + ")";
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(draw);
            }

            draw();
        })();

        /* === توليد أسئلة عشوائية === */
        function generateQuestions(count) {
            var ops = ["+", "-", "\u00D7"];
            var questions = [];

            for (var i = 0; i < count; i++) {
                var op = ops[Math.floor(Math.random() * ops.length)];
                var diff = Math.random();
                var a = 0;
                var b = 0;
                var ans = 0;

                if (diff < 0.33) {
                    a = Math.floor(Math.random() * 9) + 1;
                    b = Math.floor(Math.random() * 9) + 1;
                } else if (diff < 0.66) {
                    a = Math.floor(Math.random() * 20) + 1;
                    b = Math.floor(Math.random() * 9) + 1;
                } else {
                    a = Math.floor(Math.random() * 90) + 10;
                    b = Math.floor(Math.random() * 9) + 1;
                }

                if (op === "-" && a < b) {
                    var temp = a;
                    a = b;
                    b = temp;
                }

                if (op === "+") { ans = a + b; }
                else if (op === "-") { ans = a - b; }
                else { ans = a * b; }

                questions.push({
                    num1: a,
                    num2: b,
                    operator: op,
                    answer: ans
                });
            }

            return questions;
        }

        /* === ضغط زر الاستعداد === */
        function setReady() {
            var btn = document.getElementById("readyBtn");
            btn.disabled = true;
            document.getElementById("myDot").classList.add("green");
            gameRef.child(MY + "Ready").set(true);
        }

        /* === مراقبة حالة الخصم === */
        gameRef.child(OPP + "Ready").on("value", function(snap) {
            if (snap.val()) {
                document.getElementById("oppDot").classList.add("blue");
            }
        });

        /* === مراقبة حالتي === */
        gameRef.child(MY + "Ready").on("value", function(snap) {
            if (snap.val()) {
                document.getElementById("myDot").classList.add("green");
            }
        });

        /* === التحقق من استعداد كلا اللاعبين === */
        function checkBothReady() {
            gameRef.once("value").then(function(snap) {
                var data = snap.val();
                if (!data) { return; }
                if (data.player1Ready && data.player2Ready && !cdStarted) {
                    cdStarted = true;

                    /* توليد الأسئلة إذا لم تكن موجودة */
                    if (!data.questions) {
                        gameRef.child("questions").transaction(function(current) {
                            return current || generateQuestions(10);
                        });
                    }

                    /* بدء العداد التنازلي */
                    var startTime = Date.now();
                    gameRef.child("countdownStartTime").set(startTime);
                    startCountdown(startTime);
                }
            });
        }

        gameRef.child("player1Ready").on("value", function() { checkBothReady(); });
        gameRef.child("player2Ready").on("value", function() { checkBothReady(); });

        /* === العداد التنازلي 10 ثواني === */
        function startCountdown(startTime) {
            var box = document.getElementById("cdBox");
            var numEl = document.getElementById("cdNum");
            var btn = document.getElementById("readyBtn");

            btn.style.display = "none";
            box.classList.add("show");

            var interval = setInterval(function() {
                var elapsed = (Date.now() - startTime) / 1000;
                var remaining = Math.max(0, Math.ceil(10 - elapsed));

                numEl.textContent = remaining;
                numEl.style.animation = "none";
                numEl.offsetHeight;
                numEl.style.animation = "cdPop 0.5s ease-out";

                if (remaining <= 0) {
                    clearInterval(interval);
                    gameRef.child("gameStarted").set(true);
                    window.location.href = "player3.html";
                }
            }, 100);
        }

        /* === إذا بدأت اللعبة بالفعل (تحديث الصفحة مثلاً) === */
        gameRef.child("gameStarted").on("value", function(snap) {
            if (snap.val()) {
                window.location.href = "player3.html";
            }
        });
    </script>
</body>
</html>
