<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللاعب الثاني - التحدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0e17; color: #f0e6d3; min-height: 100vh; overflow: hidden; position: relative; }
        canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 14px 22px; background: rgba(10,14,23,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.06); z-index: 10; }
        .player-tag { font-size: 0.95rem; font-weight: 700; color: #00c9a7; display: flex; align-items: center; gap: 8px; }
        .player-tag .mini-dot { width: 9px; height: 9px; border-radius: 50%; background: #00e676; box-shadow: 0 0 8px rgba(0,230,118,0.5); animation: dotGlow 1.2s infinite; }
        @keyframes dotGlow { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
        .q-counter { font-size: 0.95rem; color: #888; }
        .score-display { font-size: 1.05rem; font-weight: 700; color: #FFB800; }
        .score-display span { font-size: 1.3rem; }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 70px 20px 20px; gap: 20px; }
        .timer-ring { position: relative; width: 100px; height: 100px; }
        .timer-ring svg { transform: rotate(-90deg); width: 100px; height: 100px; }
        .timer-ring circle { fill: none; stroke-width: 6; }
        .timer-ring .bg-ring { stroke: rgba(255,255,255,0.08); }
        .timer-ring .fg-ring { stroke: #00c9a7; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }
        .timer-ring .fg-ring.danger { stroke: #ff4444; }
        .timer-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.8rem; font-weight: 900; color: #fff; }
        .question-card {
            background: linear-gradient(145deg, rgba(26,26,46,0.92), rgba(10,14,23,0.96));
            border: 1px solid rgba(0,201,167,0.2); border-radius: 24px;
            padding: clamp(28px,5vw,50px) clamp(32px,7vw,70px); text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); min-width: min(88vw, 480px);
            position: relative; overflow: hidden;
            animation: cardAppear 0.35s ease-out;
        }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .question-card::before { content:''; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; border-radius:25px; background:linear-gradient(135deg,#00c9a7,#FFB800,#00c9a7); z-index:-1; opacity:0.2; animation:borderSpin 4s linear infinite; }
        @keyframes borderSpin { 0%{filter:hue-rotate(0deg)} 100%{filter:hue-rotate(360deg)} }
        .q-text { font-size: clamp(2.2rem,7vw,4rem); font-weight: 900; margin: 18px 0; letter-spacing: 3px; color: #fff; text-shadow: 0 0 25px rgba(0,201,167,0.2); min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .q-text .op { color: #00c9a7; margin: 0 10px; }
        .q-text .eq { color: #FFB800; margin-right: 12px; }
        .answer-row { display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
        .answer-input { width: 160px; padding: 13px 18px; font-size: 1.3rem; font-weight: 700; font-family: 'Tajawal', sans-serif; text-align: center; border: 2px solid rgba(0,201,167,0.3); border-radius: 14px; background: rgba(255,255,255,0.05); color: #fff; outline: none; transition: all 0.3s; }
        .answer-input:focus { border-color: #00c9a7; box-shadow: 0 0 18px rgba(0,201,167,0.2); }
        .answer-input:disabled { opacity: 0.4; }
        .submit-btn { padding: 13px 34px; font-size: 1.1rem; font-weight: 900; font-family: 'Tajawal', sans-serif; border: none; border-radius: 14px; background: linear-gradient(135deg, #00c9a7, #00a88a); color: #fff; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,201,167,0.4); }
        .submit-btn:active:not(:disabled) { transform: scale(0.96); }
        .submit-btn:disabled { background: #2a2a2a; cursor: not-allowed; color: #555; box-shadow: none; }
        .feedback { font-size: 1.2rem; font-weight: 700; min-height: 30px; margin-top: 12px; transition: all 0.3s; }
        .feedback.correct { color: #00e676; }
        .feedback.wrong { color: #ff4444; }
        .feedback.timeout { color: #ff9800; }
        .loading-text { font-size: 1.1rem; color: #555; animation: loadPulse 1.5s ease-in-out infinite; }
        @keyframes loadPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
        .result-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(10,14,23,0.96); backdrop-filter:blur(20px); flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:20px; }
        .result-overlay.show { display:flex; animation:fadeIn 0.5s ease; }
        @keyframes fadeIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
        .result-title { font-size: clamp(1.5rem,4vw,2.4rem); font-weight: 900; text-align: center; line-height: 1.7; }
        .result-title.win { color: #FFB800; }
        .result-title.lose { color: #ff4444; }
        .result-title.draw { color: #29b6f6; }
        .scores-box { display: flex; gap: 36px; margin: 16px 0; }
        .score-card { text-align: center; padding: 22px 28px; border-radius: 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); min-width: 130px; }
        .score-card .sc-label { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .score-card .sc-val { font-size: 2.3rem; font-weight: 900; }
        .score-card .sc-val.p1 { color: #FF6B35; }
        .score-card .sc-val.p2 { color: #00c9a7; }
        .end-btn { padding: 15px 48px; font-size: 1.15rem; font-weight: 900; font-family: 'Tajawal', sans-serif; border: none; border-radius: 50px; background: linear-gradient(135deg, #00c9a7, #FFB800); color: #0a0e17; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .end-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,201,167,0.4); }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.07; pointer-events: none; z-index: 0; }
        .orb1 { width: 280px; height: 280px; background: #00c9a7; top: -60px; left: -60px; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="glow-orb orb1"></div>
    <div class="top-bar">
        <div class="player-tag"><div class="mini-dot"></div> اللاعب الثاني</div>
        <div class="q-counter" id="qCounter">جاري التحميل...</div>
        <div class="score-display">النقاط: <span id="myScore">0</span></div>
    </div>
    <div class="content" id="gameContent">
        <div class="loading-text" id="loadingText">جاري تحميل الأسئلة...</div>
    </div>
    <div class="result-overlay" id="resultOverlay">
        <div class="result-title" id="resultTitle"></div>
        <div class="scores-box">
            <div class="score-card"><div class="sc-label">اللاعب الأول</div><div class="sc-val p1" id="finalP1">0</div></div>
            <div class="score-card"><div class="sc-label">اللاعب الثاني</div><div class="sc-val p2" id="finalP2">0</div></div>
        </div>
        <button class="end-btn" onclick="endGame()">إنهاء</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyCEEqEALOCaQo5oSoR8A_Jh9eSpHS8Sz5o",
            authDomain: "game1-bb93e.firebaseapp.com",
            databaseURL: "https://game1-bb93e-default-rtdb.firebaseio.com",
            projectId: "game1-bb93e", storageBucket: "game1-bb93e.firebasestorage.app",
            messagingSenderId: "268851425259", appId: "1:268851425259:web:0074f52657190d7347b3ae"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        var params = new URLSearchParams(window.location.search);
        var roomCode = params.get("room");
        if (!roomCode) { window.location.href = "index.html"; }
        var roomRef = db.ref("rooms/" + roomCode);

        var MY_ANSWERS = "player2Answers";
        var MY_SCORE = "player2Score";
        var TOTAL_Q = 10, Q_TIME = 10;
        var CIRCUM = 2 * Math.PI * 44;

        var currentQIndex = -1;
        var myScore = 0;
        var questionTimer = null;
        var answered = false;
        var questions = null;
        var gameLoaded = false;
        var pendingQIndex = -1;
        var resultShown = false;

        /* جسيمات */
        (function() {
            var c = document.getElementById("bg"), x = c.getContext("2d"), w = 0, h = 0, pts = [];
            function r() { w = c.width = innerWidth; h = c.height = innerHeight; } r();
            addEventListener("resize", r);
            for (var i = 0; i < 30; i++) pts.push({ x: Math.random()*2e3, y: Math.random()*2e3, r: Math.random()*1.5+0.3, dx: (Math.random()-0.5)*0.25, dy: (Math.random()-0.5)*0.25, hue: 160+Math.random()*30, a: 0.08+Math.random()*0.25 });
            (function d() { x.clearRect(0,0,w,h); for(var i=0;i<pts.length;i++){var p=pts[i];x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle="hsla("+p.hue+",100%,60%,"+p.a+")";x.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>w)p.dx*=-1;if(p.y<0||p.y>h)p.dy*=-1;}requestAnimationFrame(d); })();
        })();

        /* بناء واجهة اللعب */
        function buildGameUI() {
            var content = document.getElementById("gameContent");
            content.innerHTML = '<div class="timer-ring"><svg viewBox="0 0 100 100"><circle class="bg-ring" cx="50" cy="50" r="44"/><circle class="fg-ring" id="timerCircle" cx="50" cy="50" r="44" stroke-dasharray="276.46" stroke-dashoffset="0"/></svg><div class="timer-num" id="timerNum">10</div></div><div class="question-card" id="questionCard"><div class="q-text" id="qText">...</div><div class="answer-row"><input type="number" class="answer-input" id="ansInput" placeholder="الجواب" autocomplete="off"><button class="submit-btn" id="submitBtn" onclick="submitAnswer()">إجابة</button></div><div class="feedback" id="feedback"></div></div>';
            document.getElementById("ansInput").addEventListener("keydown", function(e) { if (e.key === "Enter") submitAnswer(); });
        }

        /* عرض السؤال */
        function showQuestion(idx) {
            if (!questions || idx < 0 || idx >= TOTAL_Q) return;
            clearInterval(questionTimer);
            currentQIndex = idx;

            var q = questions[idx];
            document.getElementById("qCounter").textContent = "السؤال " + (idx + 1) + " من " + TOTAL_Q;
            document.getElementById("qText").innerHTML = q.num1 + " <span class='op'>" + q.operator + "</span> " + q.num2 + " <span class='eq'>=</span> ?";

            var card = document.getElementById("questionCard");
            card.style.animation = "none";
            card.offsetHeight;
            card.style.animation = "cardAppear 0.35s ease-out";

            roomRef.child(MY_ANSWERS + "/" + idx).once("value", function(snap) {
                var prev = snap.val();
                if (prev) {
                    answered = true;
                    document.getElementById("ansInput").value = "";
                    document.getElementById("ansInput").disabled = true;
                    document.getElementById("submitBtn").disabled = true;
                    var fb = document.getElementById("feedback");
                    if (prev.correct) { fb.textContent = "تم الاجابة! +" + prev.points; fb.className = "feedback correct"; }
                    else if (prev.answer === null) { fb.textContent = "انتهى الوقت! +0"; fb.className = "feedback timeout"; }
                    else { fb.textContent = "تم الاجابة! +0"; fb.className = "feedback wrong"; }
                } else {
                    answered = false;
                    document.getElementById("ansInput").value = "";
                    document.getElementById("ansInput").disabled = false;
                    document.getElementById("submitBtn").disabled = false;
                    document.getElementById("feedback").textContent = "";
                    document.getElementById("feedback").className = "feedback";
                    document.getElementById("ansInput").focus();
                }

                roomRef.child("questionStartTime").once("value", function(ts) {
                    var startTime = ts.val();
                    if (!startTime) return;
                    startTimer(startTime);
                    var elapsed = (Date.now() - startTime) / 1000;
                    if (elapsed >= Q_TIME && !answered) {
                        handleTimeout(idx);
                    }
                });
            });
        }

        /* تشغيل العداد */
        function startTimer(startTime) {
            clearInterval(questionTimer);
            questionTimer = setInterval(function() {
                var elapsed = (Date.now() - startTime) / 1000;
                var rem = Math.max(0, Q_TIME - elapsed);
                var pct = rem / Q_TIME;
                document.getElementById("timerCircle").style.strokeDashoffset = CIRCUM * (1 - pct);
                document.getElementById("timerNum").textContent = Math.ceil(rem);
                if (rem <= 3) { document.getElementById("timerCircle").classList.add("danger"); }
                else { document.getElementById("timerCircle").classList.remove("danger"); }
                if (rem <= 0) {
                    clearInterval(questionTimer);
                    questionTimer = null;
                    if (!answered) handleTimeout(currentQIndex);
                    tryAdvanceQuestion();
                }
            }, 50);
        }

        /* إرسال الإجابة */
        function submitAnswer() {
            if (answered) return;
            var val = document.getElementById("ansInput").value.trim();
            if (val === "") return;
            answered = true;

            var idx = currentQIndex;
            var q = questions[idx];
            if (!q) return;
            var userAns = parseInt(val);
            var remText = document.getElementById("timerNum").textContent;
            var remSeconds = parseInt(remText) || 0;
            var points = 0;
            var fb = document.getElementById("feedback");

            if (userAns === q.answer) {
                points = remSeconds;
                fb.textContent = "تم الاجابة! +" + points;
                fb.className = "feedback correct";
            } else {
                fb.textContent = "تم الاجابة! +0";
                fb.className = "feedback wrong";
            }

            myScore += points;
            document.getElementById("myScore").textContent = myScore;
            document.getElementById("ansInput").disabled = true;
            document.getElementById("submitBtn").disabled = true;

            var updates = {};
            updates[MY_ANSWERS + "/" + idx] = { answer: userAns, correct: userAns === q.answer, points: points, timeLeft: remSeconds };
            updates[MY_SCORE] = myScore;
            roomRef.update(updates);
        }

        /* انتهاء الوقت */
        function handleTimeout(idx) {
            if (answered) return;
            answered = true;
            document.getElementById("feedback").textContent = "انتهى الوقت! +0";
            document.getElementById("feedback").className = "feedback timeout";
            document.getElementById("ansInput").disabled = true;
            document.getElementById("submitBtn").disabled = true;

            var updates = {};
            updates[MY_ANSWERS + "/" + idx] = { answer: null, correct: false, points: 0, timeLeft: 0 };
            roomRef.update(updates);
        }

        /* تقديم السؤال التالي */
        function tryAdvanceQuestion() {
            var myIdx = currentQIndex;
            roomRef.transaction(function(data) {
                if (!data || data.gameEnded) return data;
                if (data.currentQuestionIndex !== myIdx) return data;
                var nextIdx = myIdx + 1;
                if (nextIdx >= TOTAL_Q) {
                    data.gameEnded = true;
                } else {
                    data.currentQuestionIndex = nextIdx;
                    data.questionStartTime = Date.now();
                }
                return data;
            });
        }

        /* ===== مستمعات Firebase ===== */

        roomRef.child("currentQuestionIndex").on("value", function(snap) {
            var idx = snap.val();
            if (idx === null || idx === undefined || idx < 0) return;
            if (idx >= TOTAL_Q) { showResult(); return; }
            if (!questions) { pendingQIndex = idx; return; }
            showQuestion(idx);
        });

        roomRef.child("questions").on("value", function(snap) {
            var raw = snap.val();
            if (raw) {
                questions = Array.isArray(raw) ? raw : Object.values(raw);
            }
            if (questions && !gameLoaded) {
                gameLoaded = true;
                buildGameUI();

                if (pendingQIndex >= 0) {
                    showQuestion(pendingQIndex);
                    pendingQIndex = -1;
                    return;
                }

                roomRef.child("currentQuestionIndex").once("value", function(s) {
                    var idx = s.val();
                    if (idx !== null && idx !== undefined && idx >= 0 && idx < TOTAL_Q) {
                        showQuestion(idx);
                    } else {
                        roomRef.transaction(function(data) {
                            if (!data) return data;
                            if (data.currentQuestionIndex === undefined || data.currentQuestionIndex === null) {
                                data.currentQuestionIndex = 0;
                                data.questionStartTime = Date.now();
                            }
                            return data;
                        });
                    }
                });
            }
        });

        roomRef.child("gameEnded").on("value", function(snap) { if (snap.val()) showResult(); });

        function showResult() {
            if (resultShown) return;
            resultShown = true;
            clearInterval(questionTimer);
            roomRef.child("player1Score").once("value", function(s1) {
                roomRef.child(MY_SCORE).once("value", function(s2) {
                    var p1 = s1.val() || 0, p2 = s2.val() || 0;
                    document.getElementById("finalP1").textContent = p1;
                    document.getElementById("finalP2").textContent = p2;
                    var title = document.getElementById("resultTitle");
                    if (p2 > p1) { title.textContent = "تم انتهاء المسابقه والفائز هو اللاعب الثاني"; title.className = "result-title win"; }
                    else if (p1 > p2) { title.textContent = "تم انتهاء المسابقه والفائز هو اللاعب الأول"; title.className = "result-title lose"; }
                    else { title.textContent = "تم انتهاء المسابقه بالتعادل"; title.className = "result-title draw"; }
                    document.getElementById("resultOverlay").classList.add("show");
                });
            });
        }

        function endGame() {
            roomRef.remove().then(function() { window.location.href = "index.html"; });
        }
    </script>
</body>
</html>
