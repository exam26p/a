<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0e17;
            color: #f0e6d3;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .content {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; gap: 24px;
        }
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900;
            background: linear-gradient(135deg, #FFB800, #FF6B35);
            background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; animation: titleFloat 3s ease-in-out infinite;
        }
        @keyframes titleFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .code-section { text-align: center; }
        .code-label { font-size: 1.1rem; color: #888; margin-bottom: 16px; font-weight: 400; }
        .code-inputs { display: flex; gap: 14px; direction: ltr; justify-content: center; }
        .code-digit {
            width: 64px; height: 80px; text-align: center;
            font-size: 2.2rem; font-weight: 900; font-family: 'Tajawal', sans-serif;
            border: 2px solid rgba(255, 184, 0, 0.25); border-radius: 14px;
            background: rgba(255, 255, 255, 0.04); color: #FFB800;
            outline: none; transition: all 0.3s; caret-color: #FFB800;
        }
        .code-digit:focus { border-color: #FFB800; box-shadow: 0 0 24px rgba(255, 184, 0, 0.2); }
        .join-area { display: none; flex-direction: column; align-items: center; gap: 20px; margin-top: 10px; }
        .join-area.show { display: flex; }
        .join-title { font-size: 1rem; color: #666; }
        .players-row { display: flex; gap: clamp(24px, 6vw, 70px); align-items: center; }
        .player-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .p-btn {
            width: clamp(100px, 16vw, 150px); height: clamp(100px, 16vw, 150px);
            border-radius: 50%; border: 4px solid #FF6B35;
            background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0e17);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.6rem, 3.5vw, 2.5rem); color: #FF6B35; font-weight: 900;
            position: relative; overflow: hidden; font-family: 'Tajawal', sans-serif;
        }
        .p-btn.p2 { border-color: #00c9a7; color: #00c9a7; }
        .p-btn::before {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,107,53,0.2), transparent 70%);
            opacity: 0; transition: opacity 0.4s;
        }
        .p-btn.p2::before { background: radial-gradient(circle, rgba(0,201,167,0.2), transparent 70%); }
        .p-btn:hover:not(.reserved)::before { opacity: 1; }
        .p-btn:hover:not(.reserved) { transform: scale(1.1); box-shadow: 0 0 35px rgba(255,107,53,0.4); }
        .p-btn.p2:hover:not(.reserved) { box-shadow: 0 0 35px rgba(0,201,167,0.4); }
        .p-btn:active:not(.reserved) { transform: scale(0.95); }
        .p-btn.reserved { border-color: #333 !important; cursor: not-allowed; opacity: 0.4; transform: none !important; box-shadow: none !important; }
        .p-btn.reserved .btn-icon { display: none; }
        .p-btn.reserved::after { content: 'محجوز'; position: absolute; font-size: clamp(0.75rem, 1.8vw, 1rem); color: #ff4444; font-weight: 700; font-family: 'Tajawal', sans-serif; }
        .p-name { font-size: clamp(0.9rem, 2.2vw, 1.2rem); font-weight: 700; }
        .vs { font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 900; color: #FFB800; animation: vsPulse 1.5s ease-in-out infinite; }
        @keyframes vsPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(1.2)} }
        .toast {
            position: fixed; top: 20px; left: 50%; z-index: 1000;
            transform: translateX(-50%) translateY(-120px);
            background: #ff4444; color: #fff; padding: 12px 28px; border-radius: 12px;
            font-weight: 700; font-size: 0.95rem; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(255, 68, 68, 0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; }
        .orb1 { width: 380px; height: 380px; background: #FFB800; top: -100px; right: -100px; animation: orbMove1 8s ease-in-out infinite; }
        .orb2 { width: 320px; height: 320px; background: #FF6B35; bottom: -100px; left: -100px; animation: orbMove2 10s ease-in-out infinite; }
        @keyframes orbMove1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,50px)} }
        @keyframes orbMove2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-50px)} }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="toast" id="toast"></div>

    <div class="content">
        <h1>هيا بنا الى التحدي</h1>
        <div class="code-section">
            <div class="code-label">أدخل رمز الغرفة</div>
            <div class="code-inputs">
                <input type="text" maxlength="1" class="code-digit" id="d1" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="code-digit" id="d2" inputmode="numeric" autocomplete="off">
                <input type="text" maxlength="1" class="code-digit" id="d3" inputmode="numeric" autocomplete="off">
            </div>
        </div>
        <div class="join-area" id="joinArea">
            <div class="join-title">اختر فتحة اللاعب</div>
            <div class="players-row">
                <div class="player-col">
                    <button class="p-btn" id="joinBtn1" onclick="joinRoom(1)"><span class="btn-icon">1</span></button>
                    <span class="p-name">اللاعب الأول</span>
                </div>
                <span class="vs">VS</span>
                <div class="player-col">
                    <button class="p-btn p2" id="joinBtn2" onclick="joinRoom(2)"><span class="btn-icon">2</span></button>
                    <span class="p-name">اللاعب الثاني</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyCEEqEALOCaQo5oSoR8A_Jh9eSpHS8Sz5o",
            authDomain: "game1-bb93e.firebaseapp.com",
            databaseURL: "https://game1-bb93e-default-rtdb.firebaseio.com",
            projectId: "game1-bb93e",
            storageBucket: "game1-bb93e.firebasestorage.app",
            messagingSenderId: "268851425259",
            appId: "1:268851425259:web:0074f52657190d7347b3ae"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var roomRef = null;
        var roomCode = "";

        /* === جسيمات الخلفية === */
        (function initParticles() {
            var canvas = document.getElementById("bg");
            var ctx = canvas.getContext("2d");
            var w = 0, h = 0, particles = [];
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            resize();
            window.addEventListener("resize", resize);
            for (var i = 0; i < 60; i++) {
                particles.push({ x: Math.random()*2000, y: Math.random()*2000, r: Math.random()*2+0.4, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5, hue: 30+Math.random()*20, alpha: 0.15+Math.random()*0.4 });
            }
            function draw() {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < particles.length; i++) {
                    var p = particles[i];
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = "hsla(" + p.hue + ",100%,60%," + p.alpha + ")"; ctx.fill();
                    p.x += p.dx; p.y += p.dy;
                    if (p.x < 0 || p.x > w) p.dx *= -1;
                    if (p.y < 0 || p.y > h) p.dy *= -1;
                }
                for (var i = 0; i < particles.length; i++) {
                    for (var j = i+1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) {
                            ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = "rgba(255,184,0," + (0.1*(1-dist/120)) + ")"; ctx.lineWidth = 0.5; ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

        /* === إدخال رمز الغرفة === */
        var d1 = document.getElementById("d1");
        var d2 = document.getElementById("d2");
        var d3 = document.getElementById("d3");
        d1.focus();

        d1.addEventListener("input", function() {
            this.value = this.value.replace(/\D/g, "");
            if (this.value.length === 1) d2.focus();
            checkCodeComplete();
        });
        d2.addEventListener("input", function() {
            this.value = this.value.replace(/\D/g, "");
            if (this.value.length === 1) d3.focus();
            if (this.value.length === 0) d1.focus();
            checkCodeComplete();
        });
        d3.addEventListener("input", function() {
            this.value = this.value.replace(/\D/g, "");
            if (this.value.length === 0) d2.focus();
            checkCodeComplete();
        });
        d1.addEventListener("keydown", function(e) { if (e.key === "Backspace" && this.value === "") d1.focus(); });
        d2.addEventListener("keydown", function(e) { if (e.key === "Backspace" && this.value === "") d1.focus(); });
        d3.addEventListener("keydown", function(e) { if (e.key === "Backspace" && this.value === "") d2.focus(); });

        /* دعم اللصق */
        var allDigits = document.querySelectorAll(".code-digit");
        for (var i = 0; i < allDigits.length; i++) {
            allDigits[i].addEventListener("paste", function(e) {
                e.preventDefault();
                var text = (e.clipboardData || window.clipboardData).getData("text").trim();
                var digits = text.replace(/\D/g, "").slice(0, 3);
                if (digits.length >= 1) d1.value = digits[0];
                if (digits.length >= 2) d2.value = digits[1];
                if (digits.length >= 3) d3.value = digits[2];
                d3.focus();
                checkCodeComplete();
            });
        }

        function checkCodeComplete() {
            var code = d1.value + d2.value + d3.value;
            if (code.length === 3) {
                roomCode = code;
                connectToRoom();
            } else {
                roomCode = "";
                document.getElementById("joinArea").classList.remove("show");
                if (roomRef) { roomRef.off(); roomRef = null; }
            }
        }

        function connectToRoom() {
            if (roomRef) { roomRef.off(); }
            roomRef = db.ref("rooms/" + roomCode);
            document.getElementById("joinArea").classList.add("show");

            roomRef.child("player1Joined").on("value", function(snap) {
                var btn = document.getElementById("joinBtn1");
                if (snap.val()) { btn.classList.add("reserved"); } else { btn.classList.remove("reserved"); }
            });
            roomRef.child("player2Joined").on("value", function(snap) {
                var btn = document.getElementById("joinBtn2");
                if (snap.val()) { btn.classList.add("reserved"); } else { btn.classList.remove("reserved"); }
            });
        }

        /* === الانضمام للغرفة === */
        function joinRoom(playerNum) {
            if (!roomRef) return;
            var joinKey = "player" + playerNum + "Joined";
            roomRef.transaction(function(data) {
                if (data === null) { data = {}; }
                if (data[joinKey]) { return; }
                data[joinKey] = true;
                return data;
            }, function(error, committed) {
                if (committed) {
                    window.location.href = "player" + playerNum + ".html?room=" + roomCode;
                } else {
                    showToast("هذه الفتحة محجوزة بالفعل!");
                }
            });
        }

        function showToast(msg) {
            var t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(function() { t.classList.remove("show"); }, 2500);
        }
    </script>
</body>
</html>
